# Experiment 9: Scaling study
# DDO-RM should work across scales, not just one pipeline configuration
# Protects against "small pipeline-specific ablation" criticism

experiment: exp9_scaling
description: >
  Sweep model size, candidate size, RM size, prompt count, training budget.
  DDO-RM should scale: larger models, more candidates, better RM → better results.

# Model size sweep
model_sizes:
  - name: "EleutherAI/pythia-410m"
    label: "410M"
  - name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    label: "1.1B"
  - name: "Qwen/Qwen2.5-1.5B"
    label: "1.5B"
  - name: "Qwen/Qwen2.5-3B"
    label: "3B"

model_dtype: "bfloat16"

dataset: "ultrafeedback_binarized"
train_split: "train_prefs"
eval_split: "test_prefs"

methods: ["ddorm", "ppo_rlhf", "dpo"]
seeds: [42, 13]

# Candidate size sweep (per model)
candidate_sizes: [2, 4, 8, 16, 32]

# Lambda sweep
lambda_values: [0.5, 1.0, 2.0]

# Training budget sweep (as fraction of full data)
data_fractions: [0.1, 0.25, 0.5, 1.0]

# DDO-RM config
ddorm_config:
  learning_rate: 5.0e-6
  batch_size: 8
  gradient_accumulation_steps: 4
  num_epochs: 3
  tau: 1.0
  candidate_generator: "temperature"
  gen_temperature: 0.8

# PPO config
ppo_rlhf_config:
  learning_rate: 1.5e-6
  batch_size: 4
  gradient_accumulation_steps: 8
  num_epochs: 1
  kl_coeff: 0.1
  clip_range: 0.2

metrics:
  - pair_accuracy
  - reward_score
  - kl_drift
  - compute_gpu_hours
  - reward_per_gpu_hour
  - coverage_rho
  - variance_across_seeds

output_dir: "results/exp9_scaling"

figures:
  - x: model_size
    y: pair_accuracy
    group_by: method
    title: "Performance vs Model Size"
  - x: K
    y: pair_accuracy
    group_by: model_size
    title: "Performance vs Candidate Size"
  - x: compute_gpu_hours
    y: reward_score
    group_by: method
    title: "Reward Improvement per GPU-Hour"
